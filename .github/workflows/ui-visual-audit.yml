name: UI Visual Audit

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  ci-security-contract:
    name: Offline CI security contract
    runs-on: windows-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout untrusted sources without credentials
        uses: actions/checkout@v4
        with:
          lfs: false
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run offline CI security fixtures
        shell: pwsh
        run: |
          cargo run --locked --manifest-path tools/ui-generation/Cargo.toml -- ci-security-fixture --repository-root .
          .\scripts\test-ui-reference-baseline-approval.ps1 -SelfTest
          .\scripts\test-ui-supply-chain.ps1 -RepositoryRoot .

      - name: Write redacted downloadable CI failure report
        if: always()
        shell: pwsh
        run: .\scripts\write-ui-ci-failure-report.ps1 -OutputPath .\artifacts\ui-ci-security-report.json -RunMode offline_ci

      - name: Upload redacted CI failure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-ci-security-report
          path: artifacts/ui-ci-security-report.json
          if-no-files-found: error
          retention-days: 14

  reference-baseline-approval:
    name: Reference and baseline approval gate
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout pull request sources without credentials
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false
          persist-credentials: false

      - name: Require approval label for reference or baseline changes
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          $changedFiles = @(git diff --name-only $env:BASE_SHA $env:HEAD_SHA)
          $labels = @($env:PR_LABELS_JSON | ConvertFrom-Json)
          .\scripts\test-ui-reference-baseline-approval.ps1 -ChangedFiles $changedFiles -Labels $labels

  offline-reference-audit:
    name: Offline strict reference audit
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout sources and LFS references
        uses: actions/checkout@v4
        with:
          lfs: true
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Verify visual audit tool contracts
        shell: pwsh
        run: |
          cargo fmt --manifest-path tools/ui-visual-audit/Cargo.toml -- --check
          cargo test --locked --manifest-path tools/ui-visual-audit/Cargo.toml
          cargo check --locked --manifest-path tools/ui-visual-audit/Cargo.toml

      - name: Run deterministic strict reference fixture audit
        shell: pwsh
        run: .\scripts\run-ui-audit.ps1 -SelfTest

      - name: Write redacted downloadable audit failure report
        if: always()
        shell: pwsh
        run: .\scripts\write-ui-ci-failure-report.ps1 -OutputPath .\artifacts\ui-visual-audit-report.json -RunMode offline_ci

      - name: Upload redacted audit failure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-visual-audit-failure-report
          path: artifacts/ui-visual-audit-report.json
          if-no-files-found: error
          retention-days: 14

      # Online AI is intentionally absent from push and pull_request. The only
      # manual/scheduled path is a protected contract check until a repository-owned
      # provider adapter and explicit approval are added.
